name: Publish Helm Chart

# Packages the postgres-mcp Helm chart and publishes it to a GitHub Pages
# hosted Helm repository (served from the gh-pages branch) whenever a release
# tag matching vX.Y.Z is pushed.
#
# Consumers then use:
#   helm repo add postgres-mcp https://<owner>.github.io/postgres-mcp
#   helm repo update
#   helm install pg postgres-mcp/postgres-mcp
#
# One-time setup in repo Settings:
#   - Settings -> Pages -> Build and deployment -> Source: "Deploy from a branch"
#     Branch: gh-pages / (root). The branch is created automatically by the first
#     successful run of this workflow.

on:
  push:
    tags:
      # Fork release tags derived from upstream's vX.Y.Z. We accept the upstream
      # form (v3.1.0) and our SemVer pre-release fork form (v3.1.0-wengo.1), which
      # sorts immediately after the upstream release it is based on.
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      app_version:
        description: "Version to stamp into the chart (e.g. 3.1.0 or 3.1.0-wengo.1). Defaults to the latest matching tag."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  publish:
    name: Package and publish chart
    runs-on: ubuntu-latest
    permissions:
      contents: write # chart-releaser pushes to gh-pages and creates chart releases
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # chart-releaser needs full history to diff chart versions

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.18.4

      - name: Resolve versions from tag
        id: appver
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.app_version }}" ]; then
            RAW="${{ github.event.inputs.app_version }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            RAW="${GITHUB_REF_NAME}"
          else
            RAW="$(git describe --tags --abbrev=0 --match 'v[0-9]*.[0-9]*.[0-9]*')"
          fi
          # Strip an optional leading "v" -> full app version.
          # Accepts upstream X.Y.Z and fork pre-releases X.Y.Z-wengo.N (SemVer 2).
          APP_VERSION="${RAW#v}"
          SEMVER='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'
          if ! printf '%s' "$APP_VERSION" | grep -Eq "$SEMVER"; then
            echo "::error::Version '$APP_VERSION' (from '$RAW') is not X.Y.Z or X.Y.Z-<pre>"
            exit 1
          fi
          # Upstream image base = the X.Y.Z part before any "-pre" suffix. The fork
          # pre-release suffix (e.g. -wengo.1) marks a chart/packaging change on top
          # of an upstream image that is published as plain X.Y.Z.
          IMAGE_TAG="${APP_VERSION%%-*}"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved appVersion: $APP_VERSION (image base: $IMAGE_TAG)"

      - name: Stamp versions into the chart
        # The chart 'version' is managed manually in Chart.yaml (independent of the
        # app). We stamp 'appVersion' to the full tag (documents what is deployed)
        # and pin image.tag to the upstream X.Y.Z base so a real, published image is
        # pulled even when the tag carries a fork pre-release suffix.
        run: |
          set -euo pipefail
          CHART=helm/postgres-mcp/Chart.yaml
          VALUES=helm/postgres-mcp/values.yaml
          APP_VERSION='${{ steps.appver.outputs.app_version }}'
          IMAGE_TAG='${{ steps.appver.outputs.image_tag }}'
          sed -i -E "s/^appVersion: .*/appVersion: \"${APP_VERSION}\"/" "$CHART"
          # Set the default image tag (the `tag: ""` line under image:).
          sed -i -E "s/^(  tag:) .*/\1 \"${IMAGE_TAG}\"/" "$VALUES"
          echo "----- Chart.yaml -----"
          grep -E '^(version|appVersion):' "$CHART"
          echo "----- values.yaml image.tag -----"
          grep -nE '^  tag:' "$VALUES"

      - name: Lint chart
        run: |
          helm lint helm/postgres-mcp
          helm lint helm/postgres-mcp -f helm/postgres-mcp/ci/full-values.yaml

      - name: Render templates (smoke test)
        run: |
          set -euo pipefail
          helm template ci helm/postgres-mcp >/dev/null
          helm template ci helm/postgres-mcp -f helm/postgres-mcp/ci/full-values.yaml >/dev/null

      - name: Publish chart to gh-pages
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          charts_dir: helm
          # Skip if a chart release for this Chart.yaml 'version' already exists.
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pages URL where the index.yaml is served from (used in the chart index).
          CR_PAGES_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
